# AeroSpace Config

# Start AeroSpace at login
start-at-login = true

# Mouse follows focus
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

# Gaps
[gaps]
inner.horizontal = 10
inner.vertical = 10
outer.left = 10
outer.right = 10
outer.top = 10
outer.bottom = 10

# Keybindings
[mode.main.binding]
alt-slash = 'layout tiles horizontal vertical'
alt-comma = 'layout accordion horizontal vertical'
alt-f = 'fullscreen'
alt-shift-f = 'layout floating tiling'

alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'

alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'

alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'
alt-shift-3 = 'move-node-to-workspace 3'
alt-shift-4 = 'move-node-to-workspace 4'

alt-shift-minus = 'resize smart -50'
alt-shift-equal = 'resize smart +50'

# Auto-assign apps to workspaces
# 1: Terminal (Ghostty)
# 2: Browser & AI (Chrome, Safari, ChatGPT, Claude)
# 3: Communication (Teams, Outlook, Notes)
# 4: JetBrains (IntelliJ, DataGrip)

# Ghostty
[[on-window-detected]]
if.app-id = 'com.mitchellh.ghostty'
run = 'move-node-to-workspace 1'

# Chrome
[[on-window-detected]]
if.app-id = 'com.google.Chrome'
run = 'move-node-to-workspace 2'

# Safari
[[on-window-detected]]
if.app-id = 'com.apple.Safari'
run = 'move-node-to-workspace 2'

# Claude
[[on-window-detected]]
if.app-id = 'com.anthropic.claudefordesktop'
run = 'move-node-to-workspace 2'

# ChatGPT (Chrome PWA)
[[on-window-detected]]
if.app-id = 'com.google.Chrome.app.dgbbiofhojegonmgagbboheelnddaopf'
run = 'move-node-to-workspace 2'

# Microsoft Teams
[[on-window-detected]]
if.app-id = 'com.microsoft.teams2'
run = 'move-node-to-workspace 3'

# Microsoft Outlook
[[on-window-detected]]
if.app-id = 'com.microsoft.Outlook'
run = 'move-node-to-workspace 3'

# Apple Notes
[[on-window-detected]]
if.app-id = 'com.apple.Notes'
run = 'move-node-to-workspace 3'

# IntelliJ IDEA
[[on-window-detected]]
if.app-id = 'com.jetbrains.intellij'
run = 'move-node-to-workspace 4'

# DataGrip
[[on-window-detected]]
if.app-id = 'com.jetbrains.datagrip'
run = 'move-node-to-workspace 4'

