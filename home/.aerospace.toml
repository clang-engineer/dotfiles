# AeroSpace Config

# Keybindings
# NOTE: [mode.main.binding] overrides ALL defaults, so base keys must be listed
[mode.main.binding]
alt-slash = 'layout tiles horizontal vertical'
alt-comma = 'layout accordion horizontal vertical'
alt-f = 'fullscreen'
alt-shift-f = 'layout floating tiling'              # custom
alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'
alt-shift-3 = 'move-node-to-workspace 3'
alt-shift-4 = 'move-node-to-workspace 4'
alt-shift-minus = 'resize smart -50'
alt-shift-equal = 'resize smart +50'
alt-tab = 'workspace-back-and-forth'                # custom

# Auto-assign apps to workspaces
# 1: Browser & AI (Chrome, Safari, Claude, ChatGPT)
# 2: Terminal (Ghostty)
# 3: JetBrains (IntelliJ, DataGrip)
# 4: Communication (Teams, Outlook)

# ╔══════════════════════════════════════════╗
# ║  Workspace 1: Browser & AI              ║
# ╚══════════════════════════════════════════╝
[[on-window-detected]]
if.app-id = 'com.google.Chrome'              # Chrome
run = ['move-node-to-workspace 1', 'layout floating']

[[on-window-detected]]
if.app-id = 'com.apple.Safari'               # Safari
run = ['move-node-to-workspace 1', 'layout floating']

[[on-window-detected]]
if.app-id = 'com.anthropic.claudefordesktop' # Claude
run = ['move-node-to-workspace 1', 'layout floating']

[[on-window-detected]]
if.app-id = 'com.google.Chrome.app.dgbbiofhojegonmgagbboheelnddaopf' # ChatGPT (PWA)
run = ['move-node-to-workspace 1', 'layout floating']

# ╔══════════════════════════════════════════╗
# ║  Workspace 2: Terminal                  ║
# ╚══════════════════════════════════════════╝
[[on-window-detected]]
if.app-id = 'com.mitchellh.ghostty'          # Ghostty
run = 'move-node-to-workspace 2'

# ╔══════════════════════════════════════════╗
# ║  Workspace 3: JetBrains                 ║
# ╚══════════════════════════════════════════╝
[[on-window-detected]]
if.app-id = 'com.jetbrains.intellij'         # IntelliJ IDEA
run = 'move-node-to-workspace 3'

[[on-window-detected]]
if.app-id = 'com.jetbrains.datagrip'         # DataGrip
run = 'move-node-to-workspace 3'

# ╔══════════════════════════════════════════╗
# ║  Workspace 4: Communication             ║
# ╚══════════════════════════════════════════╝
[[on-window-detected]]
if.app-id = 'com.microsoft.teams2'           # Teams
run = ['move-node-to-workspace 4', 'layout floating']

[[on-window-detected]]
if.app-id = 'com.microsoft.Outlook'          # Outlook
run = ['move-node-to-workspace 4', 'layout floating']

# ╔══════════════════════════════════════════╗
# ║  Default: Floating                      ║
# ╚══════════════════════════════════════════╝
[[on-window-detected]]
run = 'layout floating'
