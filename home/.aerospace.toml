# AeroSpace Config

# Notify Hammerspoon on workspace change
exec-on-workspace-change = [
  '/bin/bash', '-c',
  'open -g hammerspoon://aerospace-workspace-changed',
]

# Keybindings
# NOTE: [mode.main.binding] overrides ALL defaults, so base keys must be listed
[mode.main.binding]
alt-slash = 'layout tiles horizontal vertical'
alt-comma = 'layout accordion horizontal vertical'
alt-f = 'fullscreen'
alt-shift-f = 'layout floating tiling'              # custom
alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'
alt-1 = 'workspace 1:Browser'
alt-2 = 'workspace 2:Terminal'
alt-3 = 'workspace 3:Company'
alt-4 = 'workspace 4:JetBrains'
alt-shift-1 = ['exec-and-forget ~/.hammerspoon/modules/aerospace-move-node.sh 1:Browser']
alt-shift-2 = ['exec-and-forget ~/.hammerspoon/modules/aerospace-move-node.sh 2:Terminal']
alt-shift-3 = ['exec-and-forget ~/.hammerspoon/modules/aerospace-move-node.sh 3:Company']
alt-shift-4 = ['exec-and-forget ~/.hammerspoon/modules/aerospace-move-node.sh 4:JetBrains']
alt-shift-minus = 'resize smart -50'
alt-shift-equal = 'resize smart +50'
alt-tab = 'workspace-back-and-forth'                # custom

# Auto-assign apps to workspaces
# 1: Browser & AI (Chrome, Safari, Claude, ChatGPT)
# 2: Terminal (Ghostty)
# 3: Communication (Teams, Outlook)
# 4: Dev Tools (IntelliJ, DataGrip)

# ╔══════════════════════════════════════════╗
# ║  Workspace 1: Browser & AI              ║
# ╚══════════════════════════════════════════╝
[[on-window-detected]]
if.app-id = 'com.google.Chrome'              # Chrome
run = ['move-node-to-workspace 1:Browser', 'layout floating']

[[on-window-detected]]
if.app-id = 'com.apple.Safari'               # Safari
run = ['move-node-to-workspace 1:Browser', 'layout floating']

[[on-window-detected]]
if.app-id = 'com.anthropic.claudefordesktop' # Claude
run = ['move-node-to-workspace 1:Browser', 'layout floating']

[[on-window-detected]]
if.app-id = 'com.google.Chrome.app.dgbbiofhojegonmgagbboheelnddaopf' # ChatGPT (PWA)
run = ['move-node-to-workspace 1:Browser', 'layout floating']

# ╔══════════════════════════════════════════╗
# ║  Workspace 2: Terminal                  ║
# ╚══════════════════════════════════════════╝
[[on-window-detected]]
if.app-id = 'com.mitchellh.ghostty'          # Ghostty
run = 'move-node-to-workspace 2:Terminal'

# ╔══════════════════════════════════════════╗
# ║  Workspace 3: Communication             ║
# ╚══════════════════════════════════════════╝
[[on-window-detected]]
if.app-id = 'com.microsoft.teams2'           # Teams
run = ['move-node-to-workspace 3:Company', 'layout floating']

[[on-window-detected]]
if.app-id = 'com.microsoft.Outlook'          # Outlook
run = ['move-node-to-workspace 3:Company', 'layout floating']

# ╔══════════════════════════════════════════╗
# ║  Workspace 4: Dev Tools                ║
# ╚══════════════════════════════════════════╝
[[on-window-detected]]
if.app-id = 'com.jetbrains.intellij'            # IntelliJ IDEA
run = ['move-node-to-workspace 4:JetBrains', 'layout floating']

[[on-window-detected]]
if.app-id = 'com.jetbrains.datagrip'            # DataGrip
run = ['move-node-to-workspace 4:JetBrains', 'layout floating']

# ╔══════════════════════════════════════════╗
# ║  Default: Floating                      ║
# ╚══════════════════════════════════════════╝
[[on-window-detected]]
run = 'layout floating'
