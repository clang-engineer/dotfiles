## Base behavior
set -g default-terminal "tmux-256color" # advertise 256color + true color capable term
set -ga terminal-overrides ",*256col*:Tc" # enable true color passthrough
set -g mouse on # enable mouse interactions
set -g base-index 1 # start window numbering at 1
setw -g pane-base-index 1 # start pane numbering at 1
set -g renumber-windows on # renumber windows when one is closed

## Window & pane
bind c new-window -c "#{pane_current_path}" # new window in current path
bind '"' split-window -v -c "#{pane_current_path}" # vertical split in current path
bind % split-window -h -c "#{pane_current_path}" # horizontal split in current path
bind s choose-tree -Zs -O name # session tree sorted by name
bind w choose-tree -Zw -O name # window tree sorted by name

## Copy mode
setw -g mode-keys vi # hjkl navigation in copy mode
set -g set-clipboard on # tmux fires OSC52 on copy → terminal puts it in the system clipboard
bind -T copy-mode-vi y send -X copy-selection-and-cancel # vim-style yank → clipboard. NOT a tmux default (fresh server has y unbound) — removing this breaks y after a restart; the running server may still show it as a leftover from an earlier source-file.
# Mouse-drag-release: keep the selection & stay in copy mode. Default is copy-pipe-and-cancel,
# which exits copy mode on release — that would make mouse-select → Y (below) impossible. Also
# not a tmux default in the no-clear form.
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-selection-no-clear
# Paste the copy-mode selection into the marked pane (an AI agent) via bracketed paste.
# Does NOT move focus — stay in this pane so you can select & send several chunks in a row,
# then switch to the agent and run them yourself. No trailing Enter, so nothing is submitted
# until you press it. Warns in the status line when no pane is marked. Mark the agent pane
# first with prefix+m; y/Enter still copy to the clipboard.
bind -T copy-mode-vi Y send -X copy-pipe-and-cancel "tmux load-buffer -b agent -; if [ $(tmux display-message -p '#{pane_marked_set}') = 1 ]; then tmux paste-buffer -t '{marked}' -b agent -p -d; else tmux display-message 'no marked pane — press prefix+m on the agent pane'; fi"

## TPM plugins
set -g @plugin 'tmux-plugins/tpm' # tmux plugin manager
set -g @plugin 'tmux-plugins/tmux-sensible' # escape-time 0, history-limit 50000, focus-events on
set -g @plugin 'christoomey/vim-tmux-navigator' # for navigating panes and vim/nvim with Ctrl-hjkl
set -g @plugin 'jimeh/tmux-themepack' # to configure tmux theme
set -g @plugin 'tmux-plugins/tmux-resurrect' # persist tmux sessions after computer restart
set -g @plugin 'tmux-plugins/tmux-continuum' # automatically saves sessions for you every 15 minutes
set -g @plugin 'hiroppy/tmux-agent-sidebar' # AI agent (Claude Code/Codex) status sidebar via hooks
set -g @sidebar_key 'a' # sidebar current-window toggle: a (Agent), off default e
set -g @sidebar_key_all 'A' # all-windows toggle: A — keeps a/A case pairing, frees default E for select-layout -E
set -g @sidebar_auto_create 'off' # do not auto-open sidebar on new windows; open manually with prefix+e
set -g @themepack 'powerline/default/cyan' # styles: default, block, double | colors: blue, cyan, gray, green, magenta, orange, purple, red, yellow
set -g @resurrect-capture-pane-contents 'on' # allow tmux-resurrect to capture pane contents
set -g @continuum-restore 'on' # enable tmux-continuum functionality

# Initialize TMUX plugin manager (keep near the bottom — only post-plugin overrides go below)
run '~/.tmux/plugins/tpm/tpm'

## Post-plugin overrides (must load after tpm/themepack to win)
# themepack sets message-style bg to the same cyan as the status bar, so a command typed at
# `prefix + :` blends into the status line and is hard to read. Give the message a contrasting
# `bg` (no `fill=`) so only the typed characters are highlighted — the rest of the status line,
# and its pane info, keeps showing through. (Must load AFTER tpm/themepack to win.)
set -g message-style "fg=black,bg=yellow"
set -g message-command-style "fg=black,bg=yellow"

# tmux-agent-sidebar's auto-close (kill a window once only the sidebar is left) is
# wired to `pane-exited` with #{window_id}, which has two bugs:
#   1. In a hook #{window_id} is the active client's current window, not the window
#      whose pane exited — so the wrong window gets checked.
#   2. `pane-exited` only fires on a pane's process exiting (`exit`/C-d), NOT on
#      `kill-pane` (prefix+x). So closing a pane with prefix+x never triggers it.
# Replace it with `window-layout-changed`, which fires on ANY pane removal (exit,
# kill-pane, …) and exposes the correct #{hook_window}. auto-close only kills a
# window that's down to just the sidebar, so the extra fires (splits/resizes) are
# harmless no-ops. Runs AFTER tpm so it wins; nothing else uses this hook.
# Upstream bug; drop this once a fix ships.
set-hook -gu pane-exited
set-hook -gu window-layout-changed
set-hook -ga window-layout-changed 'run-shell "\"#{@agent_sidebar_bin}\" auto-close \"#{hook_window}\""'

# Reload: prefix + R (tmux-sensible) | prefix + : → source-file ~/.tmux.conf | shell: tmux source-file ~/.tmux.conf
# Install new plugins: prefix + I (tpm)
